# .github/workflows/build.yml
name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      # Don't cancel the other platforms if one fails — a release should still ship the
      # bundles that built successfully.
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux
          - os: macos-latest
            target: x86_64-apple-darwin
            name: macos-intel
          - os: macos-latest
            target: aarch64-apple-darwin
            name: macos-apple-silicon

    runs-on: ${{ matrix.os }}

    # Needed for the Create Release step to push a release with GITHUB_TOKEN.
    permissions:
      contents: write

    # Signing secrets are empty until you add them — when empty the workflow builds
    # UNSIGNED, so it works out of the box. The Apple cert is deliberately NOT set here:
    # an empty `APPLE_CERTIFICATE` makes Tauri attempt (and fail) a keychain import, so it's
    # only set on the signed build step below. See RELEASING.md.
    env:
      # 'true' only when an Apple signing cert secret is present → selects the signed build.
      HAS_APPLE_CERT: ${{ secrets.APPLE_CERTIFICATE != '' }}
      # Windows — base64 .pfx + its password (consumed only by the guarded import step).
      WINDOWS_CERTIFICATE: ${{ secrets.WINDOWS_CERTIFICATE }}
      WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 23.10.0
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt update
          sudo apt install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Node.js dependencies
        run: npm install

      # Guard against shipping a release with mismatched versions across
      # package.json / tauri.conf.json / Cargo.toml.
      - name: Check version sync
        run: npm run version:check

      # Windows signing: import the .pfx into the cert store and inject its thumbprint
      # into tauri.conf.json so the bundler signs with it. Skipped when no cert secret.
      - name: Import Windows signing certificate
        if: matrix.os == 'windows-latest' && env.WINDOWS_CERTIFICATE != ''
        shell: pwsh
        run: |
          $pfx = Join-Path $env:RUNNER_TEMP 'cert.pfx'
          [IO.File]::WriteAllBytes($pfx, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE))
          $pw = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $cert = Import-PfxCertificate -FilePath $pfx -CertStoreLocation Cert:\CurrentUser\My -Password $pw
          $conf = 'src-tauri/tauri.conf.json'
          $json = Get-Content $conf -Raw | ConvertFrom-Json
          $json.bundle.windows.certificateThumbprint = $cert.Thumbprint
          $json | ConvertTo-Json -Depth 32 | Set-Content $conf
          Write-Host "Signing with thumbprint $($cert.Thumbprint)"

      # Two build steps so the Apple signing env is present ONLY when a cert exists (an empty
      # APPLE_CERTIFICATE would make Tauri try a keychain import and fail). `npx tauri` runs
      # the CLI directly — `npm run tauri build -- --target X` forwards a stray `--` the CLI
      # rejects. Windows signing (when configured) happens via the import step + thumbprint.
      - name: Build Tauri app (unsigned)
        if: ${{ !(matrix.os == 'macos-latest' && env.HAS_APPLE_CERT == 'true') }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Build Tauri app (macOS, signed + notarized)
        if: ${{ matrix.os == 'macos-latest' && env.HAS_APPLE_CERT == 'true' }}
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx tauri build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app-${{ matrix.name }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/*/*
            src-tauri/target/${{ matrix.target }}/release/*.exe
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          # Only the installers — matching by extension keeps tauri's dmg helper
          # files (bundle_dmg.sh, icon.icns) out of the published release.
          files: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*-setup.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}